name: G4F Renew

on:
  schedule:
    - cron: '3 * * * *'  
    - cron: '33 * * * *'  
  workflow_dispatch: # 允许手动触发

jobs:
  Renew-Gaming4free:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    - uses: actions/checkout@v6
    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    # - name: ⚙ 设置代理 (sing-box)
    #   continue-on-error: true
    #   env:
    #     NODE_LINK: ${{ secrets.NODE_LINK }}
    #   run: |
    #     bash setup_proxy.sh

    # =========================
    # 🟡 1️⃣ 安装官方 WARP 客户端 (纯 SOCKS5 模式)
    # =========================
    - name: Setup Official WARP Proxy
      run: |
        # 导入 Cloudflare 官方源并安装
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 注册并设置为纯代理模式 (默认占用 40000 端口，绝不断网)
        warp-cli --accept-tos registration new
        warp-cli --accept-tos mode proxy
        warp-cli --accept-tos connect
        
        echo "⏳ 等待 WARP 隧道建立 (10秒)..."
        sleep 10

    - name: 🚀 运行续期脚本
      env:
        SERVERS: ${{ secrets.SERVERS }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        IS_PROXY: "true"
        # PROXY_SERVER: "http://127.0.0.1:1081"
        PROXY_SERVER: "socks5://127.0.0.1:40000"
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 g4f_renew.py

    - name: 上传截图产物
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ github.run_number }}
        path: artifacts/*.png
        if-no-files-found: ignore
        retention-days: 7
        
