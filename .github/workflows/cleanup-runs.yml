name: Delete old workflow runs

on:
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行
  schedule:
    - cron: '20 0 1 * *' # 可选：每天午夜自动运行一次清理

permissions:
  actions: write
  contents: write
  
jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0         # 不按天数保留
          keep_minimum_runs: 7   # 保留最近的 7 次记录

      - name: Update keep-alive timestamp
        run: |
          date '+%Y-%m-%d %H:%M:%S' > .keepalive
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .keepalive
          git commit -m "chore: keep repo active [skip ci]" || echo "No changes to commit"
          git push
