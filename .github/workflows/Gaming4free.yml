name: Gaming4free Auto Renew

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch:       # 保持手动触发，方便随时测试

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: ⚙ 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash setup_proxy.sh

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        SERVERS: ${{ secrets.SERVERS }}  
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python gaming4free.py

    - name: 上传截图产物
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ github.run_number }}
        path: artifacts/*.png
        if-no-files-found: ignore
        retention-days: 7
